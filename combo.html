<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criador de Combos - PratinhoPraTudo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="../logoPraFood.jpeg" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --ifood-red: #ea1d2c;
        --ifood-bg: #f2f2f2;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--ifood-bg);
      }
      .btn-primary {
        background-color: var(--ifood-red);
        color: white;
        transition: 0.3s;
      }
      .btn-primary:hover {
        background-color: #c4111e;
      }
      /* Estilo para esconder checkbox padrão e usar o card como seletor */
      .product-checkbox:checked + .product-card {
        border-color: var(--ifood-red);
        background-color: #fff1f2;
        ring: 2px;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <header
        class="flex items-center justify-between mb-8 border-b pb-6 border-gray-200"
      >
        <div class="flex items-center gap-4">
          <img
            src="../logoPraFood.jpeg"
            alt="PraFood"
            class="w-16 h-16 rounded-lg shadow-sm"
          />
          <div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">
              Criar Novo Combo
            </h1>
            <p class="text-sm text-gray-500 font-medium">
              Gestão de Cardápio > Ofertas
            </p>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
          <div
            class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
          >
            <div class="p-6 border-b border-gray-100 bg-gray-50/50">
              <label
                class="text-sm font-bold text-gray-700 uppercase tracking-widest"
              >
                1. Selecione os itens do combo
              </label>
            </div>

            <div class="relative mb-4">
              <span
                class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
              >
                <i class="fas fa-search"></i>
              </span>
              <input
                type="text"
                id="searchInput"
                oninput="filterProducts()"
                placeholder="Buscar produto pelo nome..."
                class="w-full pl-10 pr-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-red-500 border-gray-200"
              />
            </div>

            <div
              id="productList"
              class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto"
            >
              <div class="col-span-full py-10 text-center text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Carregando itens do seu cardápio...</p>
              </div>
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <div
            class="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-red-600"
          >
            <h3 class="font-black text-gray-800 mb-6 flex items-center gap-2">
              <i class="fas fa-tag text-red-600"></i> CONFIGURAR OFERTA
            </h3>

            <div class="space-y-5">
              <div>
                <label
                  class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                  >Nome Comercial</label
                >
                <input
                  type="text"
                  id="comboName"
                  placeholder="Ex: Combo Galera 2"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all font-medium"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                  >Descrição para o Cliente</label
                >
                <textarea
                  id="comboDesc"
                  rows="3"
                  placeholder="Ex: 2 Burgers + 1 Batata M + 1 Refri"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all text-sm"
                ></textarea>
              </div>

              <div>
                <label
                  class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                  >URL da Imagem do Combo</label
                >
                <input
                  type="url"
                  id="comboImage"
                  placeholder="https://site.com/sua-imagem.jpg"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all text-sm"
                />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                    >Início das Vendas</label
                  >
                  <input
                    type="time"
                    id="availStart"
                    value="00:00"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all text-sm font-medium"
                  />
                </div>
                <div>
                  <label
                    class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                    >Fim das Vendas</label
                  >
                  <input
                    type="time"
                    id="availEnd"
                    value="23:59"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none transition-all text-sm font-medium"
                  />
                </div>
              </div>

              <div>
                <label
                  class="block text-[10px] font-black text-gray-400 mb-1 uppercase"
                  >Preço Promocional do Combo</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-4 flex items-center text-gray-400 font-bold"
                    >R$</span
                  >
                  <input
                    type="number"
                    id="comboPrice"
                    placeholder="0.00"
                    class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-green-500 focus:bg-white outline-none transition-all font-black text-xl text-green-600"
                  />
                </div>
              </div>
            </div>

            <div
              id="summaryArea"
              class="mt-8 p-5 bg-blue-50 rounded-2xl border border-blue-100"
            >
              <div class="flex items-start gap-3">
                <i class="fas fa-info-circle text-blue-500 mt-1"></i>
                <div class="text-sm text-blue-800 leading-relaxed">
                  <strong>Dica de Precificação:</strong><br />
                  Selecione itens ao lado para ver a economia gerada para o
                  cliente.
                </div>
              </div>
            </div>

            <button
              id="btnSave"
              onclick="saveCombo()"
              class="w-full btn-primary mt-8 py-4 rounded-2xl font-black shadow-lg shadow-red-200 flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-wider"
            >
              <i class="fas fa-rocket"></i>
              Publicar Combo
            </button>
          </div>

          <a
            href="./index.html"
            class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 rounded-lg hover:bg-gray-100 hover:text-gray-900 transition-all"
          >
            <span class="text-xl opacity-70">⬅️</span>
            <span>Voltar ao Sistema</span>
          </a>
        </div>
      </div>
    </div>

    <script src="./combo.js"></script>
  </body>
</html>
